<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="amazon.css">
</head>
<body>
    <div id="navbar">
        <img src="images/logo.png" id="logo">
        <div id="search-holder">
            <input type="text" id="search"/>
            <button id="searchbutton">
                <img src="images/search.png" id="searchbuttonimg">
            </button>
        </div>
        <div class="nav-text" id="signin">
            Sign in
        </div>
        <div class="nav-text" id="cart">
            Cart: 0
        </div>
    </div>

    <div id="hero">
        <img src="images/hero.png" id="heroimg">
    </div>
    <div id="section">
        <div class="box">
            <div class="boximg-container">
                <img src="images/search.png" class="boximg">
            </div>
            <div class="boxdescr">
                <div class="boxtitle">hello</div>
                <div>description</div>
            </div>
        </div>
    </div>
    <script src="amazon.js"></script>
</body>
</html>
